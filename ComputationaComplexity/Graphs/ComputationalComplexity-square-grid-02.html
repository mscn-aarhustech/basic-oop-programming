<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big O Complexity - Adjusted Scaling</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            color: #212529;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            padding: 1.5rem;
            text-align: center;
            flex-shrink: 0;
        }
        h1 {
            color: #343a40;
            margin: 0;
            /* ADJUST HEADLINE SIZE HERE */
            font-size: 2.8rem; 
            font-weight: 700;
        }
        .chart-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .canvas-container {
            width: 90vw; 
            max-height: 80vh;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>

    <header>
        <!-- <h1>Big O Notation Complexity Comparison</h1> -->
    </header>
    
    <div class="chart-wrapper">
        <div class="canvas-container">
            <canvas id="bigOChart"></canvas>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ctx = document.getElementById('bigOChart').getContext('2d');
            
            function continuousFactorial(n) {
                if (n <= 1) return 1;
                return Math.sqrt(2 * Math.PI * n) * Math.pow((n / Math.E), n);
            }

            const maxLimitX = 200; 
            const maxLimitY = 100;
            const labels = [];

            for (let i = 0; i <= maxLimitX; i += 0.01) labels.push(i);

            const bigOConfigs = [
                { name: 'Constant O(1)', func: n => 1, color: '#22c55e' },
                { name: 'Logarithmic O(log n)', func: n => Math.log2(n || 1), color: '#3b82f6' },
                { name: 'Linear O(n)', func: n => n, color: '#eab308' },
                { name: 'Log linear O(n log n)', func: n => n * Math.log2(n || 1), color: '#f97316' },
                { name: 'Quadratic O(n²)', func: n => Math.pow(n, 2), color: '#ef4444' },
                { name: 'Exponential O(2ⁿ)', func: n => Math.pow(2, n), color: '#a855f7' },
                { name: 'Factorial O(n!)', func: n => continuousFactorial(n), color: '#1e293b' }
            ];

            const datasets = bigOConfigs.map(config => {
                const data = labels.map(n => {
                    const val = config.func(n);
                    return val > maxLimitY * 1.5 ? null : val;
                });
                return {
                    label: config.name,
                    data: data,
                    borderColor: config.color,
                    borderWidth: 4,
                    pointRadius: 0,
                    fill: false,
                    tension: 0.1,
                    spanGaps: false
                };
            });

            new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    aspectRatio: maxLimitX / maxLimitY, 
                    animation: false,
                    plugins: {
                        legend: {
                            labels: { font: { size: 20, weight: '500' }, usePointStyle: true }
                        }
                    },
                    scales: {
                        x: {
                            type: 'linear',
                            title: { display: true, text: 'Input Size (n)', font: { size: 20, weight: '600' } },
                            ticks: { 
                                font: { size: 18 },
                                stepSize: 10 // FORCES X-AXIS GRID STEPS TO 10
                            },
                            min: 0,
                            max: maxLimitX,
                            grid: { color: 'rgba(0, 0, 0, 0.1)' }
                        },
                        y: {
                            title: { display: true, text: 'Operations / Complexity', font: { size: 20, weight: '600' } },
                            ticks: { 
                                font: { size: 18 },
                                stepSize: 10 // FORCES Y-AXIS GRID STEPS TO 10
                            },
                            min: 0,
                            max: maxLimitY,
                            grid: { color: 'rgba(0, 0, 0, 0.1)' }
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
